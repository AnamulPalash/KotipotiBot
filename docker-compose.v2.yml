services:

  bot:
    build: ./kotipoti
    image: kotipotibot_codex_v2
    container_name: kotipotibot_codex_bot
    restart: unless-stopped
    volumes:
      - kotipoti_codex_data:/data
    env_file:
      - .env
    environment:
      DRY_RUN: "${DRY_RUN:-true}"          # Keep true unless you have reviewed live-mode safeguards
      DB_PATH: "/data/kotipoti.db"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      CANDLES_NEEDED: "${CANDLES_NEEDED:-200}"
      CANDLES_15M: "${CANDLES_15M:-150}"
      CANDLES_1H: "${CANDLES_1H:-150}"
      CANDLES_4H: "${CANDLES_4H:-120}"
      TELEGRAM_TOKEN:   "${TELEGRAM_TOKEN:-}"     # set in .env
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"   # set in .env
    command: python main.py
    networks:
      - kotipoti_codex_net

  dashboard:
    build: ./kotipoti
    image: kotipotibot_codex_v2
    container_name: kotipotibot_codex_dashboard
    restart: unless-stopped
    volumes:
      - kotipoti_codex_data:/data      # needs write access for SQLite WAL mode
    ports:
      - "${DASHBOARD_HOST_PORT:-5001}:5000"
    env_file:
      - .env
    environment:
      DB_PATH: "/data/kotipoti.db"
      DASHBOARD_PORT: "5000"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-CHANGE_ME}"   # override in .env
    command: python dashboard.py
    depends_on:
      - bot
    networks:
      - kotipoti_codex_net

networks:
  kotipoti_codex_net:
    driver: bridge

volumes:
  kotipoti_codex_data:   # Shared SQLite DB between Codex bot and dashboard
