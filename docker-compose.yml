services:

  freqtrade:
    image: freqtradeorg/freqtrade:stable
    container_name: kotipotibot_freqtrade
    restart: unless-stopped
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./strategies:/freqtrade/user_data/strategies:ro
      - ./config.json:/freqtrade/user_data/config.json:ro
    # No host port exposed — Nginx proxies to freqtrade:8080 internally
    expose:
      - "8080"
    env_file:
      - .env
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --config /freqtrade/user_data/config.json
      --strategy ShortScalper
    networks:
      - kotipoti_net

  nginx:
    image: nginx:alpine
    container_name: kotipotibot_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - nginx_patched:/patched
    ports:
      - "8090:8090"   # Web UI on host port 8090
    entrypoint: ["sh", "/entrypoint.sh"]
    depends_on:
      - freqtrade
    networks:
      - kotipoti_net

  hermes:
    image: python:3.11-slim
    container_name: kotipotibot_hermes
    restart: unless-stopped
    volumes:
      - ./hermes:/app
      - ./user_data/logs:/freqtrade/user_data/logs:ro
      - ./user_data/exports:/freqtrade/user_data/exports:ro
      - ./user_data:/freqtrade/user_data:ro
    working_dir: /app
    env_file:
      - .env
    command: >
      sh -c "pip install requests schedule --quiet &&
             python hermes_agent.py"
    depends_on:
      - freqtrade
    networks:
      - kotipoti_net

  dashboard:
    image: python:3.11-slim
    container_name: kotipotibot_dashboard
    restart: unless-stopped
    volumes:
      - ./dashboard_app.py:/app/dashboard_app.py:ro
      - ./custom-dashboard.jsx:/app/custom-dashboard.jsx:ro
      - ./dashboard_requirements.txt:/app/dashboard_requirements.txt:ro
    working_dir: /app
    ports:
      - "5000:5000"   # Custom dashboard on host port 5000
    env_file:
      - .env
    environment:
      # Point at the freqtrade container on the internal network
      FREQTRADE_API: "http://freqtrade:8080"
      FREQTRADE_USERNAME: "kotipoti"
      DASHBOARD_PORT: "5000"
      # FREQTRADE_PASSWORD is read from .env
    command: >
      sh -c "pip install flask flask-cors requests --quiet &&
             python dashboard_app.py"
    depends_on:
      - freqtrade
    networks:
      - kotipoti_net

networks:
  kotipoti_net:
    driver: bridge

volumes:
  nginx_patched:   # Holds the patched FreqUI JS bundle
