server {
    listen 8090;
    server_name _;

    # Serve the patched JS bundle statically
    # The entrypoint.sh downloads and patches it into /patched/
    location ~* ^/assets/index-.*\.js$ {
        root /patched;
        # Strip the /assets/ prefix and serve directly from /patched/
        rewrite ^/assets/(index-.+\.js)$ /$1 break;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Content-Type "application/javascript" always;
    }

    # Proxy everything else to Freqtrade
    location / {
        proxy_pass         http://freqtrade:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout 86400;

        # Rewrite HTML title in the index.html shell
        gunzip on;
        proxy_set_header Accept-Encoding "";
        sub_filter '<title>freqUI - KotipotiBot</title>' '<title>KotipotiBot</title>';
        sub_filter '<title>FreqUI</title>'               '<title>KotipotiBot</title>';
        sub_filter '<title>freqUI</title>'               '<title>KotipotiBot</title>';
        sub_filter_types text/html;
        sub_filter_once off;
    }
}
